name: Feature Request
description: Suggest a new feature or optimization
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should it work?
    validations:
      required: true
  - type: dropdown
    id: tier
    attributes:
      label: Optimization Tier
      description: Which tier does this belong to?
      options:
        - "N/A — not a performance optimization"
        - "Tier 1 — Free speed (zero VRAM cost)"
        - "Tier 2 — Quantization (fp8/4bit)"
        - "Tier 3 — Compilation (torch.compile)"
        - "Tier 4 — Distribution (DeepSpeed)"
        - "Tier 5 — Future exploration"
