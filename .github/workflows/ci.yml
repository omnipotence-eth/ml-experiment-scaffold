name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --all-packages --extra dev
      - run: uv run ruff check src/ scripts/ tests/
      - run: uv run ruff format --check src/ scripts/ tests/

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --all-packages --extra dev
      - run: uv run pytest tests/ -v --tb=short -x
        env:
          WANDB_MODE: disabled
